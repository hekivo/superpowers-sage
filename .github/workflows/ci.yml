name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sync-check:
    name: Verify derived files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify cursor-hooks.json is in sync with hooks.json
        run: node scripts/sync-cursor-hooks.mjs --check

      - name: Verify Codex/Cursor manifests are in sync with Claude
        run: node scripts/sync-codex-manifests.mjs --check

      - name: Verify generated Codex plugin (plugins/ + .agents/) is in sync
        run: node scripts/build-codex-plugin.mjs --check

  tests:
    name: Script tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run detect-design-tools tests
        run: node scripts/test-detect-design-tools.mjs

      - name: Run detect-sage-project tests
        run: node scripts/test-detect-sage-project.mjs

      - name: Run validate-skills tests
        run: node scripts/test-validate-skills.mjs
